name: App CI

on:
  push:
    branches: [main, master, 'release/**']
  pull_request:
    branches: [main, master, 'release/**']

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests and debug APK
        run: ./gradlew :android:testDebugUnitTest :android:assembleDebug --no-daemon

  web-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
